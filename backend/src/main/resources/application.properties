spring.application.name=rag-backend

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env,beans,prometheus
management.endpoint.health.show-details=always

# Tracing — send all spans to Jaeger via OTLP HTTP
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# MCP client — connects to the rag-tools service at startup
spring.ai.mcp.client.sse.connections.rag-tools.url=http://localhost:8082

# S3 bucket for document uploads
app.s3.bucket-name=${S3_BUCKET_NAME:rag-document-dev}
app.s3.region=${AWS_REGION:us-east-1}

# AWS Bedrock credentials via AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars (or IAM role)
spring.ai.bedrock.aws.region=${BEDROCK_REGION:eu-west-3}
spring.ai.bedrock.converse.chat.options.model=eu.anthropic.claude-haiku-4-5-20251001-v1:0

# Keycloak JWT validated against the rag-assistant realm (public keys auto-discovered via OIDC)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/rag-assistant}

# DataSource pgvector
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/ragdb
spring.datasource.username=${DB_USER:raguser}
spring.datasource.password=${DB_PASSWORD:ragpass}

# Chat memory (persisted in PostgreSQL — table SPRING_AI_CHAT_MEMORY)
# Spring AI's own schema initializer conflicts with the pgvector one; use Spring Boot's init instead.
spring.ai.chat.memory.repository.jdbc.initialize-schema=never
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:chat-memory.sql

# pgVector store
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# Bedrock Titan Embeddings V2 (1024 dimensions)
spring.ai.bedrock.titan.embedding.enabled=true
spring.ai.bedrock.titan.embedding.model=amazon.titan-embed-text-v2:0
spring.autoconfigure.exclude=\
  org.springframework.ai.model.bedrock.cohere.autoconfigure.BedrockCohereEmbeddingAutoConfiguration,\
  org.springframework.ai.model.bedrock.titan.autoconfigure.BedrockTitanEmbeddingAutoConfiguration

# Amazon Comprehend — DetectToxicContent is only available in specific regions.
# Supported: us-east-1, us-west-2, eu-central-1, ap-southeast-1, ap-southeast-2
app.comprehend.region=${COMPREHEND_REGION:eu-central-1}

# CORS — comma-separated list of allowed origins; override with CORS_ALLOWED_ORIGINS env var in production
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=21MB
app.upload.max-file-size-bytes=${UPLOAD_MAX_FILE_SIZE_BYTES:20971520}

# Prompt guard
app.guard.max-length=2000
# Comma-separated custom terms to block (competitor names, codenames, etc.)
app.guard.blocked-terms=
# Amazon Comprehend toxicity score threshold (0.0–1.0); requests above this are rejected
app.guard.toxicity-threshold=0.7
