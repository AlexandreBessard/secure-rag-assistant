spring.application.name=rag-backend

# AWS Bedrock — credentials via AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars (or IAM role)
spring.ai.bedrock.aws.region=${AWS_REGION:eu-west-1}
spring.ai.bedrock.converse.chat.options.model=eu.anthropic.claude-haiku-4-5-20251001-v1:0

# Exclude DataSource autoconfiguration until pgvector/Postgres is wired up for RAG
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
