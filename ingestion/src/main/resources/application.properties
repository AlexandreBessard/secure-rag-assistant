spring.application.name=rag-ingestion

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env,beans,prometheus
management.endpoint.health.show-details=always
spring.profiles.default=local

# AWS region used by both Spring Cloud AWS (S3/SQS) and Spring AI Bedrock
spring.cloud.aws.region.static=${AWS_REGION:eu-west-1}
spring.ai.bedrock.aws.region=${BEDROCK_REGION:eu-west-1}

# DataSource pgvector
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/ragdb
spring.datasource.username=${DB_USER:raguser}
spring.datasource.password=${DB_PASSWORD:ragpass}

# pgVector store
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# Bedrock Titan Embeddings V2 (1024 dimensions)
spring.ai.bedrock.titan.embedding.enabled=true
spring.ai.bedrock.titan.embedding.model=amazon.titan-embed-text-v2:0
spring.autoconfigure.exclude=\
  org.springframework.ai.model.bedrock.cohere.autoconfigure.BedrockCohereEmbeddingAutoConfiguration,\
  org.springframework.ai.model.bedrock.titan.autoconfigure.BedrockTitanEmbeddingAutoConfiguration
